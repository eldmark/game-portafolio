server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Serve the API from the same origin so the browser never issues a cross-origin
  # preflight, whatever host (apex or www) the visitor loaded.
  location /api/ {
    # ponytail: variable proxy_pass + Docker DNS so nginx boots even when the
    # backend container is not up yet; static proxy_pass fails config load instead.
    resolver 127.0.0.11 valid=30s;
    set $backend_upstream http://backend:4000;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $backend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
